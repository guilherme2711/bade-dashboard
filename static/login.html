<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Grupo Bade</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; min-height: 100vh; display: flex; overflow: hidden; }

    .left-panel {
      flex: 1;
      background: linear-gradient(135deg, #0a1628 0%, #1a3a6e 50%, #1e4d8c 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }
    .left-panel::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      border: 80px solid rgba(255,255,255,0.04);
      top: -200px; left: -200px;
    }
    .left-panel::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      border: 60px solid rgba(255,255,255,0.04);
      bottom: -100px; right: -100px;
    }

    .logo-wrap { position: relative; z-index: 2; text-align: center; }

    /* Logo tipográfico do Grupo Bade */
    .bade-logo-text { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .bade-b { font-size: 5rem; font-weight: 900; color: #fff; line-height: 1; letter-spacing: -0.05em; }
    .bade-b span { color: #f59e0b; }
    .bade-grupo { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.3em; color: rgba(255,255,255,0.5); text-transform: uppercase; }
    .bade-nome { font-size: 2.2rem; font-weight: 800; color: #fff; letter-spacing: 0.05em; text-transform: uppercase; }

    .logo-tagline { color: rgba(255,255,255,0.4); font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 2rem; }
    .logo-sub { color: rgba(255,255,255,0.2); font-size: 0.62rem; letter-spacing: 0.1em; margin-top: 6px; }

    .right-panel {
      width: 420px;
      flex-shrink: 0;
      background: #f8f8f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2.5rem;
    }

    /* Logo menor no formulário */
    .form-logo-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem; }
    .form-bade-b { font-size: 2.5rem; font-weight: 900; color: #1a3a6e; line-height: 1; }
    .form-bade-b span { color: #f59e0b; }
    .form-bade-nome { font-size: 1.1rem; font-weight: 800; color: #1a3a6e; letter-spacing: 0.08em; }
    .form-bade-grupo { font-size: 0.6rem; font-weight: 600; letter-spacing: 0.25em; color: #aaa; text-transform: uppercase; margin-top: 2px; }

    .form-title { font-size: 1.3rem; font-weight: 600; color: #1a1a18; margin-bottom: 4px; }
    .form-sub { font-size: 0.78rem; color: #aaa; margin-bottom: 2rem; }
    .field { width: 100%; margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.72rem; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
    .field input { width: 100%; padding: 11px 14px; border-radius: 8px; border: 1px solid #e0e0d8; font-size: 0.88rem; color: #1a1a18; outline: none; background: #fff; transition: border 0.15s; }
    .field input:focus { border-color: #1a3a6e; }
    .btn-login { width: 100%; padding: 12px; border-radius: 8px; border: none; background: linear-gradient(135deg, #1a3a6e, #2563EB); color: #fff; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; letter-spacing: 0.02em; transition: opacity 0.15s; }
    .btn-login:hover { opacity: 0.9; }
    .erro { background: #FEE2E2; color: #B91C1C; font-size: 0.78rem; padding: 8px 12px; border-radius: 8px; margin-bottom: 1rem; text-align: center; display: none; width: 100%; }
    .erro.show { display: block; }
    .form-footer { margin-top: 2rem; font-size: 0.68rem; color: #ccc; text-align: center; letter-spacing: 0.05em; }

    @media (max-width: 700px) {
      .left-panel { display: none; }
      .right-panel { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="left-panel">
    <div class="logo-wrap">
      <div class="bade-logo-text">
        <div class="bade-grupo">Grupo</div>
        <div class="bade-nome">BADE</div>
        <div style="width:60px;height:3px;background:#f59e0b;border-radius:2px;margin-top:4px;"></div>
      </div>
      <div class="logo-tagline">Inteligência de Varejo</div>
      <div class="logo-sub">Dashboard de Giro de Produtos</div>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-logo-wrap">
      <div class="form-bade-nome">GRUPO BADE</div>
      <div class="form-bade-grupo">Inteligência de Varejo</div>
    </div>
    <div class="form-title">Bem-vindo</div>
    <div class="form-sub">Acesse o painel de gestão</div>
    <div class="erro" id="erro">Usuário ou senha incorretos.</div>
    <form method="POST" action="/login" onsubmit="return validar()" style="width:100%">
      <div class="field">
        <label>Usuário</label>
        <input type="text" name="usuario" id="usuario" placeholder="Digite seu usuário" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" name="senha" id="senha" placeholder="Digite sua senha" autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-login">Entrar</button>
    </form>
    <div class="form-footer">Grupo Bade · v1.1 · Acesso restrito</div>
  </div>

  <script>
    if (window.location.search.includes('erro=1')) {
      document.getElementById('erro').classList.add('show');
    }
    function validar() {
      const u = document.getElementById('usuario').value.trim();
      const s = document.getElementById('senha').value.trim();
      if (!u || !s) {
        document.getElementById('erro').textContent = 'Preencha usuário e senha.';
        document.getElementById('erro').classList.add('show');
        return false;
      }
      return true;
    }
  </script>
</body>
</html>
